name: Notify on new Moodle minor/major release

on:
  schedule:
    # Run weekly on Mondays at 07:00 UTC (after the patch update workflow at 06:00)
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new minor or major series
        id: check
        run: |
          CURRENT_SERIES=$(grep '^version' manifest.toml | grep -oE '[0-9]+\.[0-9]+')
          CURRENT_MAJOR=$(echo "$CURRENT_SERIES" | cut -d. -f1)
          CURRENT_MINOR=$(echo "$CURRENT_SERIES" | cut -d. -f2)

          # Get all stable tags, extract unique major.minor series, find anything newer
          LATEST_SERIES=$(curl -s "https://api.github.com/repos/moodle/moodle/tags?per_page=100" \
            | jq -r '.[].name' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -oE '[0-9]+\.[0-9]+' \
            | sort -Vu \
            | tail -1)

          LATEST_MAJOR=$(echo "$LATEST_SERIES" | cut -d. -f1)
          LATEST_MINOR=$(echo "$LATEST_SERIES" | cut -d. -f2)

          if [ "$LATEST_MAJOR" -gt "$CURRENT_MAJOR" ] || \
             { [ "$LATEST_MAJOR" -eq "$CURRENT_MAJOR" ] && [ "$LATEST_MINOR" -gt "$CURRENT_MINOR" ]; }; then
            echo "new_series=$LATEST_SERIES" >> "$GITHUB_OUTPUT"
            echo "current_series=$CURRENT_SERIES" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if issue already exists for this series
        if: steps.check.outputs.found == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="New Moodle series available: ${{ steps.check.outputs.new_series }}"
          EXISTS=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$TITLE" --json title \
            | jq -r '.[].title' \
            | grep -Fc "$TITLE" || true)
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"

      - name: Open notification issue
        if: steps.check.outputs.found == 'true' && steps.existing.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT="${{ steps.check.outputs.current_series }}"
          NEW="${{ steps.check.outputs.new_series }}"
          NEW_MAJOR=$(echo "$NEW" | cut -d. -f1)
          NEW_MINOR=$(echo "$NEW" | cut -d. -f2)

          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "New Moodle series available: ${NEW}" \
            --label "upgrade" \
            --body "## New Moodle series: ${NEW}.x

          The auto-update workflow tracks patch releases within the **${CURRENT}.x** series only.
          Moodle **${NEW}.x** is now available and requires a deliberate upgrade decision.

          ### Before upgrading, check:
          - [ ] PostgreSQL version requirement for Moodle ${NEW}.x (may require PG 16+)
          - [ ] PHP version requirement
          - [ ] Release notes: https://moodledev.io/general/releases/${NEW_MAJOR}.${NEW_MINOR}
          - [ ] YunoHost compatibility

          ### To upgrade when ready:
          1. Update \`manifest.toml\` — change \`version\` to \`${NEW}.0~ynh1\` and update the download URL + SHA256
          2. The auto-update workflow will then track \`${NEW}.x\` patch releases automatically
          3. Run \`yunohost app upgrade moodle -u \"https://github.com/verzog/moodle_ynh\"\`"
