name: Auto-update Moodle version

on:
  schedule:
    # Run daily at 06:00 UTC — Moodle releases on Mondays
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest stable Moodle tag
        id: latest
        run: |
          # Get the latest tag matching vX.Y.Z (excludes RC, beta, weekly builds)
          LATEST=$(curl -s https://api.github.com/repos/moodle/moodle/tags \
            | jq -r '.[].name' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check
        run: |
          CURRENT=$(grep '^version' manifest.toml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          LATEST="${{ steps.latest.outputs.version }}"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Already at $LATEST, nothing to do."
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Update available: $CURRENT -> $LATEST"
          fi

      - name: Download tarball and compute SHA256
        if: steps.check.outputs.needed == 'true'
        id: sha
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          URL="https://github.com/moodle/moodle/archive/refs/tags/${TAG}.tar.gz"
          curl -sL "$URL" -o moodle.tar.gz
          SHA=$(sha256sum moodle.tar.gz | cut -d' ' -f1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update manifest.toml
        if: steps.check.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          URL="${{ steps.sha.outputs.url }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i "s|^version = \".*\"|version = \"${VERSION}~ynh1\"|" manifest.toml
          sed -i "s|^    url = \"https://github.com/moodle/moodle/archive/refs/tags/.*\"|    url = \"${URL}\"|" manifest.toml
          sed -i "s|^    sha256 = \".*\"|    sha256 = \"${SHA}\"|" manifest.toml

      - name: Open pull request
        if: steps.check.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "auto-update/moodle-${{ steps.latest.outputs.version }}"
          commit-message: "Upgrade Moodle to ${{ steps.latest.outputs.version }}"
          title: "Upgrade Moodle to ${{ steps.latest.outputs.version }}"
          body: |
            Automated update to Moodle **${{ steps.latest.outputs.version }}**.

            - Updated `manifest.toml` version, download URL and SHA256
            - Trigger YunoHost CI by commenting `!testme` on this PR

            Release notes: https://moodledev.io/general/releases/${{ steps.latest.outputs.version }}
          labels: "upgrade"
