#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

  # Path to source
  alias __INSTALL_DIR__/public/;

  index index.php;

  # Common parameter to increase upload size limit in conjunction with dedicated php-fpm file
  client_max_body_size __PHP_UPLOAD_MAX_FILESIZE__;

  try_files $uri $uri/ __PATH__/r.php$is_args$args;

  location ~ [^/]\.php(/|$) {
    fastcgi_pass unix:/var/run/php/php__PHP_VERSION__-fpm-__APP__.sock;
    include fastcgi_params_with_auth;
  }
  # Hide all dot files but allow "Well-Known URIs" as per RFC 5785 
location ~ /\.(?!well-known).* {
    return 404;
} 
  # Don't allow direct access to various internal files. See MDL-69333 
location ~ (/vendor/|/node_modules/|composer\.json|/readme|/README|readme\.txt|/upgrade\.txt|/UPGRADING\.md|db/install\.xml|/fixtures/|/behat/|phpunit\.xml|\.lock|environment\.xml) { 
    deny all;
    return 404; 
  }
}
