#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/config_panel.v1.schema.json

version = "1.0"

[main]
name = "Moodle settings"

    [main.php]
    name = "PHP & performance"

        [main.php.php_upload_max_filesize]
        ask = "Maximum upload file size"
        type = "string"
        default = "1G"
        help = "Sets both PHP upload_max_filesize/post_max_size and the NGINX client_max_body_size. Use a size suffix: M for megabytes, G for gigabytes (e.g. 512M, 2G)."

        [main.php.php_memory_limit]
        ask = "PHP memory limit per process"
        type = "string"
        default = "256M"
        help = "RAM each PHP-FPM worker may use. Raise this if you see out-of-memory errors in Moodle logs. Typical range: 128M – 512M."

        [main.php.php_max_execution_time]
        ask = "PHP max execution time (seconds)"
        type = "number"
        default = 300
        help = "Maximum time a PHP script may run. Increase for slow report generation or large course restores."

        [main.php.php_max_input_vars]
        ask = "PHP max input vars"
        type = "number"
        default = 5000
        help = "Moodle requires at least 5000. Increase if you use very large quiz forms or course formats."

    [main.cron]
    name = "Cron"

        [main.cron.cron_interval]
        ask = "Cron interval (minutes)"
        type = "select"
        choices = ["1", "2", "5", "10", "15", "30"]
        default = "15"
        help = "How often the Moodle background task scheduler runs. 15 minutes is the upstream default; lower values improve task responsiveness at the cost of slightly more CPU."
